<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />

    <!-- PWA + Icons. Paths point at the real files in public/ ROOT — the old
         /icons/* paths 404'd, breaking the iOS "Add to Home Screen" icon. The
         web app manifest is injected by VitePWA (do NOT also link the stale
         /site.webmanifest, which conflicted with it). -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />

    <meta name="description" content="Vintage Mac-style JeffOS Portfolio" />
    <!-- Modern standard (Chrome/Android) + Apple legacy (older iOS Safari). -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="JeffOS" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>JeffOS</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
