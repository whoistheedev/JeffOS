<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />

    <!-- PWA + Icons. Paths point at the real files in public/ ROOT — the old
         /icons/* paths 404'd, breaking the iOS "Add to Home Screen" icon. The
         web app manifest is injected by VitePWA (do NOT also link the stale
         /site.webmanifest, which conflicted with it). -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />

    <meta
      name="description"
      content="Jeffrey James Idodo — Senior Software Engineer modernizing healthcare operations through AI-assisted automation, EDI infrastructure, and scalable multi-tenant platforms. Portfolio presented as JeffOS, a macOS-inspired web OS."
    />
    <link rel="canonical" href="https://whoisjeff.dev/" />
    <!-- Modern standard (Chrome/Android) + Apple legacy (older iOS Safari). -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="JeffOS" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Open Graph (LinkedIn / Slack / Facebook) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="JeffOS" />
    <meta property="og:url" content="https://whoisjeff.dev/" />
    <meta
      property="og:title"
      content="Jeffrey James Idodo | Building AI-Powered Revenue Cycle Management Systems"
    />
    <meta
      property="og:description"
      content="Senior Software Engineer modernizing healthcare operations through AI-assisted automation, EDI infrastructure, and scalable multi-tenant platforms. Explore the portfolio as JeffOS, a macOS-inspired web OS."
    />
    <meta property="og:image" content="https://whoisjeff.dev/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="JeffOS — Jeffrey James Idodo, building AI-powered revenue cycle management systems"
    />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Jeffrey James Idodo | Building AI-Powered Revenue Cycle Management Systems"
    />
    <meta
      name="twitter:description"
      content="Senior Software Engineer modernizing healthcare operations through AI-assisted automation, EDI infrastructure, and scalable multi-tenant platforms. Portfolio as JeffOS, a macOS-inspired web OS."
    />
    <meta name="twitter:image" content="https://whoisjeff.dev/og-image.png" />

    <!-- Structured data: Person (helps Google's Knowledge Graph + rich results) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Jeffrey James Idodo",
        "url": "https://whoisjeff.dev/",
        "jobTitle": "Senior Software Engineer",
        "email": "mailto:jeffreyjidodo@gmail.com",
        "sameAs": [
          "https://github.com/whoistheedev",
          "https://www.linkedin.com/in/jeffrey-james-idodo-4402b6390"
        ],
        "knowsAbout": [
          "Software Engineering",
          "HealthTech",
          "Revenue Cycle Management",
          "EDI infrastructure",
          "Multi-tenant architecture",
          "Supabase",
          "PostgreSQL",
          "TypeScript",
          "React",
          "AI-assisted automation"
        ]
      }
    </script>

    <title>Jeffrey James Idodo | Building AI-Powered Revenue Cycle Management Systems</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
